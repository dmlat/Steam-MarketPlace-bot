services:
  postgres:
    image: postgres:16
    container_name: steam_scanner_db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: steam_scanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanner_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d steam_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
